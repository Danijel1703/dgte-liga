<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Tennis ball body -->
  <circle cx="32" cy="32" r="30" fill="#c8e040"/>

  <!-- White seam lines — two curved arcs like a real tennis ball -->
  <!-- Top seam -->
  <path
    d="M 10 20 C 22 14, 42 14, 54 20"
    fill="none"
    stroke="white"
    stroke-width="4"
    stroke-linecap="round"
  />
  <!-- Bottom seam -->
  <path
    d="M 10 44 C 22 50, 42 50, 54 44"
    fill="none"
    stroke="white"
    stroke-width="4"
    stroke-linecap="round"
  />

  <!-- Subtle shadow rim for depth -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="rgba(0,0,0,0.12)" stroke-width="2"/>
</svg>
